services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: queuestorm-investigator:latest
    container_name: queuestorm-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/queuestorm
      - MONGODB_DB_NAME=queuestorm
      - NODE_ENV=production
      - PORT=8000
      - HOSTNAME=0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - queuestorm-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  mongo:
    image: mongo:7
    container_name: queuestorm-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - queuestorm-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
    name: queuestorm_mongo_data

networks:
  queuestorm-net:
    name: queuestorm-net
    driver: bridge
